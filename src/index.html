<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jost:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../dist/css/style.css" />
    <title>Document</title>
  </head>
  <body>
    <header>
      <div class="header-logo">
        <img src="assets/logo.png" />
        <div class="platform-title">Warner Live</div>
      </div>
      <div class="header-buttons">
        <div>Inicio</div>
        <div>Buscar</div>
      </div>
    </header>
    <main>
      <div class="section-title">
        Los <span id="top-text"></span> más populares hoy
      </div>
      <section class="top">
        <div class="top-item"><img src="assets/top/1.jpg" /></div>
        <div class="top-item"><img src="assets/top/2.jpg" /></div>
        <div class="top-item"><img src="assets/top/3.jpg" /></div>
        <div class="top-item"><img src="assets/top/4.jpg" /></div>
        <div class="top-item"><img src="assets/top/5.jpg" /></div>
      </section>
      <div class="section-title">Comedias</div>
      <section class="first">
        <div class="item"><img src="assets/line-2/1.jpg" /></div>
        <div class="item"><img src="assets/line-2/2.jpg" /></div>
        <div class="item"><img src="assets/line-2/3.jpg" /></div>
        <div class="item"><img src="assets/line-2/4.jpg" /></div>
        <div class="item"><img src="assets/line-2/5.jpg" /></div>
        <div class="item"><img src="assets/line-2/6.jpg" /></div>
      </section>
      <div class="section-title">Dramas basados en libros</div>
      <section class="second">
        <div class="item"><img src="assets/line-1/1.jpg" /></div>
        <div class="item"><img src="assets/line-1/2.jpg" /></div>
        <div class="item"><img src="assets/line-1/3.jpg" /></div>
        <div class="item"><img src="assets/line-1/4.jpg" /></div>
        <div class="item"><img src="assets/line-1/5.jpg" /></div>
        <div class="item"><img src="assets/line-1/6.jpg" /></div>
      </section>
    </main>
    <footer></footer>
    <script>
      const handleGridHover = () => {
        const sections = document.querySelectorAll(".top, .first, .second");

        sections.forEach((section) => {
          // Obtenemos solo los elementos visibles para evitar cálculos erróneos en el Top
          const allItems = Array.from(
            section.querySelectorAll(".item, .top-item"),
          );

          const resetSection = () => {
            allItems.forEach((el) => el.classList.remove("shrink"));
            section.style.removeProperty("--shrink-scale");
          };

          allItems.forEach((item) => {
            item.addEventListener("mouseenter", () => {
              // 1. Limpieza total antes de calcular para evitar inconsistencias
              resetSection();

              // 2. Usamos offsetTop para detectar la fila (es inmune a las escalas de animación)
              const itemTop = item.offsetTop;
              const neighbors = allItems.filter((sib) => {
                return (
                  Math.abs(sib.offsetTop - itemTop) < 20 &&
                  sib !== item &&
                  sib.style.display !== "none"
                );
              });

              const countInLine = neighbors.length + 1;

              if (countInLine > 1) {
                // 3. Constante 0.25: compensa el scale(1.2) y el gap de 5px
                const shrinkFactor = 1 - 0.25 / (countInLine - 1);
                section.style.setProperty("--shrink-scale", shrinkFactor);
                neighbors.forEach((sib) => sib.classList.add("shrink"));
              }
            });

            item.addEventListener("mouseleave", resetSection);
          });
        });
      };

      const setupTopSection = () => {
        const topSection = document.querySelector(".top");
        const topText = document.getElementById("top-text");
        const items = Array.from(topSection.querySelectorAll(".top-item"));

        // Calculamos cuántos caben en la primera línea basándonos en el ancho
        const containerWidth = topSection.offsetWidth;
        const itemMinWidth = 225; // El valor que pasamos al mixin
        const gap = 5;

        // Calculamos la cantidad teórica que cabe
        let countInFirstLine = Math.floor(
          (containerWidth + gap) / (itemMinWidth + gap),
        );

        // Restricción: Mínimo 3, Máximo lo que haya disponible (ej. 5)
        let finalCount = Math.max(3, Math.min(countInFirstLine, items.length));

        // Actualizamos el número en el HTML
        if (topText) topText.textContent = finalCount;

        // Mostramos solo los N primeros, ocultamos el resto
        items.forEach((item, index) => {
          item.style.display = index < finalCount ? "block" : "none";
        });
      };

      window.addEventListener("DOMContentLoaded", () => {
        setupTopSection();
        handleGridHover();
      });

      window.addEventListener("resize", () => {
        setupTopSection();
      });
    </script>
  </body>
</html>
